<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1024 1024" role="img" aria-label="Denali National Park and Preserve">
  <title>Alaska Itinerary</title>

  <defs>
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>

    <!-- Arch: semicircle radius 320 centered at (512,540), opens upward -->
    <clipPath id="arch">
      <path d="M192 540 A320 320 0 0 1 832 540 Z"/>
    </clipPath>

    <!-- Path for the curved "NATIONAL PARK AND PRESERVE" text along the
         lower interior of the circular sticker. CCW so the glyphs sit
         upright with ascenders pointing toward center. -->
    <path id="bottomArc" d="M 132 738 A 460 460 0 0 0 892 738" fill="none"/>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- Cream sticker background -->
    <rect width="1024" height="1024" fill="#efe2b8"/>

    <!-- Horizontal sunset bands inside the arch -->
    <g clip-path="url(#arch)">
      <rect x="192" y="220" width="640" height="80" fill="#eab835"/>
      <rect x="192" y="300" width="640" height="80" fill="#e08436"/>
      <rect x="192" y="380" width="640" height="80" fill="#cd4a36"/>
      <rect x="192" y="460" width="640" height="80" fill="#79a7be"/>
    </g>

    <!-- Mountain silhouette (clipped to the arch) -->
    <g clip-path="url(#arch)">
      <path d="
        M192 540
        L232 500
        L270 520
        L320 460
        L362 480
        L408 420
        L448 380
        L484 332
        L514 296
        L534 314
        L552 354
        L572 332
        L598 304
        L622 326
        L644 370
        L676 350
        L706 388
        L734 420
        L764 452
        L796 480
        L820 510
        L832 540 Z" fill="#1c2536"/>

      <!-- Snow caps on the three most prominent peaks -->
      <path d="M498 326 L514 296 L526 316 L534 314 L530 332 L516 322 L506 332 Z" fill="#f3e8c4"/>
      <path d="M590 322 L598 304 L610 320 L622 326 L614 338 L600 332 Z" fill="#f3e8c4"/>
      <path d="M438 396 L448 380 L460 390 L470 400 L460 408 L448 398 Z" fill="#f3e8c4"/>
    </g>

    <!-- Arch outline (curved top + flat base) -->
    <path d="M192 540 A320 320 0 0 1 832 540" fill="none" stroke="#1c2536" stroke-width="8" stroke-linecap="round"/>
    <line x1="184" y1="540" x2="840" y2="540" stroke="#1c2536" stroke-width="8" stroke-linecap="round"/>

    <!-- DENALI -->
    <text x="512" y="690" text-anchor="middle"
          font-family="DejaVu Sans, Liberation Sans, Helvetica, Arial, sans-serif"
          font-weight="900" font-size="138" fill="#1c2536"
          letter-spacing="6">DENALI</text>

    <!-- 20,310 FT — outlined / stroke-only -->
    <text x="512" y="772" text-anchor="middle"
          font-family="DejaVu Sans, Liberation Sans, Helvetica, Arial, sans-serif"
          font-weight="700" font-size="58" fill="none"
          stroke="#1c2536" stroke-width="2.6"
          letter-spacing="4">20,310 FT</text>

    <!-- NATIONAL PARK AND PRESERVE — characters individually positioned and
         rotated along the bottom arc. We can't rely on <textPath> because
         librsvg (used at build time to rasterize the PNGs) only partially
         supports it; per-glyph placement renders identically in browsers
         and in sharp/librsvg. Positions computed from a circle centered
         at (512, 478.77) with radius 460, span 111.42° at the bottom. -->
    <g font-family="DejaVu Sans, Liberation Sans, Helvetica, Arial, sans-serif"
       font-weight="800" font-size="50" fill="#1c2536">
      <text x="131.95" y="737.93" transform="rotate(55.71 131.95 737.93)" text-anchor="middle">N</text>
      <text x="153.24" y="766.67" transform="rotate(51.25 153.24 766.67)" text-anchor="middle">A</text>
      <text x="176.69" y="793.68" transform="rotate(46.80 176.69 793.68)" text-anchor="middle">T</text>
      <text x="202.18" y="818.79" transform="rotate(42.34 202.18 818.79)" text-anchor="middle">I</text>
      <text x="229.54" y="841.83" transform="rotate(37.88 229.54 841.83)" text-anchor="middle">O</text>
      <text x="258.60" y="862.69" transform="rotate(33.43 258.60 862.69)" text-anchor="middle">N</text>
      <text x="289.20" y="881.21" transform="rotate(28.97 289.20 881.21)" text-anchor="middle">A</text>
      <text x="321.15" y="897.31" transform="rotate(24.51 321.15 897.31)" text-anchor="middle">L</text>
      <text x="388.31" y="921.83" transform="rotate(15.60 388.31 921.83)" text-anchor="middle">P</text>
      <text x="423.11" y="930.10" transform="rotate(11.14 423.11 930.10)" text-anchor="middle">A</text>
      <text x="458.45" y="935.64" transform="rotate(6.69 458.45 935.64)" text-anchor="middle">R</text>
      <text x="494.11" y="938.42" transform="rotate(2.23 494.11 938.42)" text-anchor="middle">K</text>
      <text x="565.55" y="935.64" transform="rotate(-6.69 565.55 935.64)" text-anchor="middle">A</text>
      <text x="600.89" y="930.10" transform="rotate(-11.14 600.89 930.10)" text-anchor="middle">N</text>
      <text x="635.69" y="921.83" transform="rotate(-15.60 635.69 921.83)" text-anchor="middle">D</text>
      <text x="702.85" y="897.31" transform="rotate(-24.51 702.85 897.31)" text-anchor="middle">P</text>
      <text x="734.80" y="881.21" transform="rotate(-28.97 734.80 881.21)" text-anchor="middle">R</text>
      <text x="765.40" y="862.69" transform="rotate(-33.43 765.40 862.69)" text-anchor="middle">E</text>
      <text x="794.46" y="841.83" transform="rotate(-37.88 794.46 841.83)" text-anchor="middle">S</text>
      <text x="821.82" y="818.79" transform="rotate(-42.34 821.82 818.79)" text-anchor="middle">E</text>
      <text x="847.31" y="793.68" transform="rotate(-46.80 847.31 793.68)" text-anchor="middle">R</text>
      <text x="870.76" y="766.67" transform="rotate(-51.25 870.76 766.67)" text-anchor="middle">V</text>
      <text x="892.05" y="737.93" transform="rotate(-55.71 892.05 737.93)" text-anchor="middle">E</text>
    </g>
  </g>
</svg>
