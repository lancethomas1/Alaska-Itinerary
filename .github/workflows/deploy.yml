name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Periodic re-sync so newly added iCloud Shared Album photos appear
  # without a code push. GitHub may delay scheduled runs by up to ~hour
  # during peak load — that's the worst-case staleness.
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Server-side fetch of the iCloud Shared Album → public/album.json
      # + public/photos/*.jpg. No CORS issue because this runs on a CI
      # IP, not a browser. Skipped silently if iCloud refuses (keeps the
      # last good copy of album.json from a prior run, when present).
      - name: Sync iCloud Shared Album
        run: node scripts/sync-icloud-album.mjs
        continue-on-error: true

      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
